<!doctype html>
<html lang="en">
    <head>
      <meta charset="UTF-8" />
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>windbnb</title>
      <link rel="stylesheet" href="./src/style.css" />
      <script type="module" src="/src/scripts/main.js"></script>
    </head>
  <body class="bg-[#ffff]">

    <div id="menu" class="fixed -top-full left-0 w-full bg-white text-black p-6 z-50 transition-all duration-300 shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-bold">Edit your search</h2>
            <button id="ocultar" class="bg-gray-300 p-2 rounded-full font-bold px-4">X</button>
        </div>

        <div class="border border-gray-300 rounded-2xl p-4 mb-6">
        <div class="pb-2 border-b">
          <span class="text-xs text-gray-500 block">LOCATION</span>
          <span class="font-medium">state, country</span>
        </div>
        <div class="pt-2">
          <span class="text-xs text-gray-500 block">GUESTS</span>
          <span id="totalguests" class="font-medium">1, guest</span>
        </div>
      </div>
      
      <div class="flex flex-col gap-4 mb-6">
         <div class="flex justify-between items-center">
          <div>
            <p class="font-bold text-sm">Adults,</p>
            <p class="text-xs text-gray-400">age 13 or above</p>
          </div>
          <div class="flex items-center gap-3">
            <button id="btn-adults-sub" class="w-8 h-8 border border-gray-400 rounded flex items-center justify-center">-</button>
            <span id="txt-adults">0</span>
            <button id="btn-adults-add" class="w-8 h-8 border border-gray-400 rounded flex items-center justify-center">+</button>
          </div>
        </div>

         <div class="flex justify-between items-center">
          <div>
            <p class="font-bold text-sm">Children</p>
            <p class="text-xs text-gray-400">Ages 0 to 12</p>
          </div>
          <div class="flex items-center gap-3">
            <button id="btn-children-sub" class="w-8 h-8 border border-gray-400 rounded flex items-center justify-center">-</button>
            <span id="txt-children">0</span>
            <button id="btn-children-add" class="w-8 h-8 border border-gray-400 rounded flex items-center justify-center">+</button>
          </div>
        </div>
    </div>

        <div class="flex justify-center">
          <button id="btn-search" class="bg-[#ED635B] text-white px-8 py-3 rounded-full font-medium">search</button>
        </div>
    </div>

            <div class="p-4 gap-3">

                <form class="bg-[#ffff] flex mx-auto max-w-md text-gray-500 p-2 shadow-lg rounded-xl" >
                  <div class="border-r border-gray-200 px-4 py-3"><input name="location" type="text" placeholder="Add location" class="w-full px-1 py-2 rounded-lg placeholder-gray-400 text-sm focus:outline-none" /></div>
                  <div class="border-l border-gray-200 px-4 py-3"><input name="guests" type="text" placeholder="Add guests" class="w-full px-2 py-1 rounded-lg placeholder-gray-400 text-sm focus:outline-none" /></div> 
                  <div class="px-2 py-1 flex">
                     <button id="mostrar" type="submit" class="px-2 py-1 text-[#ED635B] flex items-center justify-center">
                      <h2 class="ml-4 text-2xl fa-solid fa-magnifying-glass"></h2>
                    </button>
                  </div>
                
                </form>

                 <div class="flex justify-between items-baseline mt-4">
                     <h1 class="text-xl font-bold mt-4">Stays in Finland</h1>
                     <span class="" id="txt-adults">12+ stays</span>
                
            </div>
         <div class="bg-white rounded-lg max-w-xl mx-auto my-4 ">
    
    
    <div class="text-sm text-gray-800 mb-3">
        <img class="rounded-4xl" src="/src/images/fin.jpg" alt="">
    </div>

    <div class="pt-2 text-sm to-gray-500">

        <div class="flex items-center justify-between">
         <span class="font-semibold text-gray-400"> entire apartment . 2 beds</span>
         <i class="fa-solid fa-star star text-amber-500"><span class="font-light text-gray-400 score">4.4</span></i>
        </div>
        <span class="flex justify-between items-baseline gap-1 font-semibold text-gray-700">
            <h3 class="mt-1 text-gray-900 font-bold text-base tracking-tight">stylist apartment in center of the city</h3>
            
         
          </span>
        
        </div>

</div>

   </body>
</html>
