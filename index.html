<!doctype html>
<html lang="en">
    <head>
      <meta charset="UTF-8" />
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>windbnb</title>
      <link rel="stylesheet" href="./src/style.css" />
      <script type="module" src="/src/scripts/main.js"></script>
    </head>
  <body class="bg-[#ffff]">

    <div id="menu" class="fixed -top-full left-0 w-full bg-white text-black p-6 z-50 transition-all duration-300 shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <div><img src="/src/images/logo-f7862584.svg" alt="windbnb Logo"> </div>
            <button id="ocultar" class="p-2 rounded-full font-semibold text-2xl px-4">X</button>
        </div>

        <div class="shadow-md md:flex rounded-2xl p-4 mb-6">
          <div class="pb-2 border-dashed md:border-b-0 md:border-r border-gray-200 md:w-1/3">
            <span class="font-medium block mb-1">LOCATION</span>
            <input id="menu-location-input" type="text" placeholder="Add location" class="w-full text-sm text-gray-500 focus:outline-none bg-transparent"/>
          </div>

          <div class="pt-2 md:w-1/3 md:pl-4">
            <span class="font-medium">GUESTS</span><span id="warning-bg" class="text-red-500 font-bold text-xl hidden">*</span>
            <span id="totalguests" class="text-xs text-gray-500 block">0, guest</span>
          </div>
          <div class="hidden md:flex md:w-1/3 justify-center items-center">
            <button id="btn-search" class="bg-[#ED635B] text-white px-8 py-3 text-2xl rounded-full font-normal "><h2 class="mr-3 text-xl fa-solid fa-magnifying-glass"></h2>  search</button>
          </div>
        </div>
      
      <div class="grid grid-cols-1 md:grid-cols-3 mb-6 gap-6">
            <div id="location-suggestions" class="flex flex-col gap-2 p-2 max-h-60 overflow-y-auto">
            </div>

            <div class="flex flex-col gap-4">
              <div class="justify-between items-center">
                <div>
                  <p class="font-bold text-sm">adultos <span id="warning-menu" class="text-red-500 font-bold hidden">*</span></p>
                  <p class="text-xs text-gray-400">age 13 or above</p>
                </div>
                <div class="flex items-center gap-3 p-2">
                  <button id="btn-adultos-sub" class="w-6 h-6 border border-gray-400 rounded flex items-center justify-center">-</button>
                  <span id="txt-adultos">0</span>
                  <button id="btn-adultos-add" class="w-6 h-6 border border-gray-400 rounded flex items-center justify-center">+</button>
                </div>
              </div>
              <div class="justify-between items-center">
                <div>
                  <p class="font-bold text-sm">niños</p>
                  <p class="text-xs text-gray-400">Ages 0 to 12</p>
                </div>
                <div class="flex items-center gap-3 p-2">
                  <button id="btn-niños-sub" class="w-6 h-6 border border-gray-400 rounded flex items-center justify-center">-</button>
                  <span id="txt-niños">0</span>
                  <button id="btn-niños-add" class="w-6 h-6 border border-gray-400 rounded flex items-center justify-center">+</button>
                </div>
              </div>
            </div>
            <div class="hidden md:block"></div>
          </div>  

        <div class="flex md:hidden mt-6 justify-center">
            <button id="btn-search-mobile" class="bg-[#ED635B] text-white px-8 py-3 text-2xl rounded-full font-normal">
            <h2 class="mr-3 text-xl fa-solid fa-magnifying-glass"></h2>  search</button>
        </div>
    </div>

    <div class="p-4 gap-3">
      <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
        <img src="/src/images/logo-f7862584.svg" alt="windbnb Logo">

        <div id="search-bar-trigger" class="bg-[#ffff] flex max-w-md text-gray-500 p-2 shadow-lg rounded-xl cursor-pointer">
          <div class="border-r border-gray-200 px-4 py-3 flex items-center">
            <span id="header-location" class="w-full px-1 py-2 text-gray-400 text-sm select-none">Add location</span>
          </div>
          <div class="border-l border-gray-200 px-4 py-3 flex items-center">
            <span id="header-guests" class="w-full px-2 py-1 text-gray-400 text-sm select-none">Add guests</span>
          </div> 
          <div class="px-2 py-1 flex">
             <button id="mostrar" type="button" class="px-2 py-1 text-[#ED635B] flex items-center justify-center">
              <h2 class="ml-4 text-2xl fa-solid fa-magnifying-glass"></h2>
            </button>
          </div>
        </div>
      </header>

      <div class="flex justify-between items-baseline mt-4">
        <h1 class="text-xl font-bold mt-4">Stays in Finland</h1>
        <span class="" id="stays-count">12+ stays</span>
      </div>
      
      <div id="stays-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-6"></div>
      
      <div class="bg-white rounded-lg max-w-xl mx-auto my-4 "></div>
    </div>

    
    <div id="details-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full overflow-hidden shadow-2xl transition-all transform scale-95 duration-300">
            <div class="relative">
                <img id="modal-img" src="" alt="" class="w-full h-64 object-cover">
                <button id="close-modal" class="absolute top-4 right-4 bg-white/80 hover:bg-white text-gray-800 font-bold p-2 rounded-full shadow-md transition-all">✕</button>
            </div>
            <div class="p-6">
                <div class="flex items-center gap-2 text-sm text-gray-500 mb-2">
                    <span id="modal-superhost" class="border border-gray-800 text-gray-800 px-2 py-0.5 rounded-full text-xs font-bold hidden">SUPERHOST</span>
                    <span id="modal-type-beds"></span>
                    <div class="ml-auto flex items-center gap-1 text-amber-500">
                        <i class="fa-solid fa-star"></i>
                        <span id="modal-rating" class="text-gray-700 font-semibold"></span>
                    </div>
                </div>
                <h3 id="modal-title" class="text-xl font-bold text-gray-900 mb-4"></h3>
                <div class="border-t border-gray-100 pt-4 text-sm text-gray-600 space-y-2">
                    <p><strong>Ubicación:</strong> <span id="modal-location"></span></p>
                    <p><strong>Capacidad máxima:</strong> <span id="modal-max-guests"></span> huéspedes</p>
                </div>
            </div>
        </div>
    </div>
   </body>
</html>
